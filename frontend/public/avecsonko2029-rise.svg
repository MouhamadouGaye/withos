<!-- frontend/public/avecsonko2029-rise.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="riseGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#006400" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="transparent"/>
  
  <!-- Lignes d'ascension -->
  <path d="M 80,280 Q 140,200 200,120 Q 260,200 320,280" fill="none" stroke="#8B0000" stroke-width="3"/>
  <path d="M 100,280 Q 150,210 200,140 Q 250,210 300,280" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  
  <!-- Points sur la trajectoire -->
  <circle cx="200" cy="120" r="8" fill="#FFD700"/>
  <circle cx="200" cy="120" r="15" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  
  <!-- Barres de progression -->
  <rect x="130" y="290" width="140" height="4" rx="2" fill="#8B0000" opacity="0.2"/>
  <rect x="130" y="290" width="100" height="4" rx="2" fill="#8B0000"/>
  
  <!-- Texte -->
  <text x="200" y="330" font-family="'Montserrat', sans-serif" 
        font-size="16" font-weight="300" fill="#8B0000" text-anchor="middle" letter-spacing="8">
    AVEC
  </text>
  
  <text x="200" y="360" font-family="'Montserrat', sans-serif" 
        font-size="34" font-weight="800" fill="#006400" text-anchor="middle" letter-spacing="3">
    SONKO
  </text>
  
  <text x="200" y="388" font-family="'Montserrat', sans-serif" 
        font-size="18" font-weight="600" fill="#FFD700" text-anchor="middle" letter-spacing="8">
    2029
  </text>
</svg>