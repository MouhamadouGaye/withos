<!-- frontend/public/avecsonko2029-nexus.svg -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient principal premium -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A0000"/>
      <stop offset="50%" stop-color="#F7C948"/>
      <stop offset="100%" stop-color="#005F3C"/>
    </linearGradient>

    <!-- Gradient lumineux -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4B0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F7C948" stop-opacity="0"/>
    </radialGradient>

    <!-- Ombre douce -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <!-- Glow moderne -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background transparent -->
  <rect width="512" height="512" fill="transparent"/>

  <!-- Anneau futuriste -->
  <g transform="translate(256 165)">
    <!-- Cercle externe -->
    <circle r="98"
            fill="none"
            stroke="url(#mainGradient)"
            stroke-width="8"
            stroke-linecap="round"
            filter="url(#softShadow)"
            opacity="0.95"/>

    <!-- Cercle interne -->
    <circle r="82"
            fill="none"
            stroke="#F7C948"
            stroke-width="2"
            opacity="0.25"/>

    <!-- Lignes réseau -->
    <g stroke="url(#mainGradient)" stroke-width="3" opacity="0.55">
      <line x1="0" y1="0" x2="0" y2="-98"/>
      <line x1="0" y1="0" x2="69" y2="-69"/>
      <line x1="0" y1="0" x2="98" y2="0"/>
      <line x1="0" y1="0" x2="69" y2="69"/>
      <line x1="0" y1="0" x2="0" y2="98"/>
      <line x1="0" y1="0" x2="-69" y2="69"/>
      <line x1="0" y1="0" x2="-98" y2="0"/>
      <line x1="0" y1="0" x2="-69" y2="-69"/>
    </g>

    <!-- Points périphériques -->
    <g fill="#F7C948">
      <circle cx="0" cy="-98" r="5"/>
      <circle cx="69" cy="-69" r="5"/>
      <circle cx="98" cy="0" r="5"/>
      <circle cx="69" cy="69" r="5"/>
      <circle cx="0" cy="98" r="5"/>
      <circle cx="-69" cy="69" r="5"/>
      <circle cx="-98" cy="0" r="5"/>
      <circle cx="-69" cy="-69" r="5"/>
    </g>

    <!-- Glow central -->
    <circle r="36" fill="url(#coreGlow)" opacity="0.8"/>

    <!-- Noyau -->
    <circle r="14"
            fill="#F7C948"
            filter="url(#neonGlow)"/>
  </g>

  <!-- Texte -->
  <g text-anchor="middle" font-family="'Montserrat', 'Inter', sans-serif">

    <!-- AVEC -->
    <text x="256"
          y="345"
          font-size="42"
          font-weight="500"
          letter-spacing="14"
          fill="#7A0000"
          opacity="0.9">
      AVEC
    </text>

    <!-- SONKO -->
    <text x="256"
          y="415"
          font-size="84"
          font-weight="900"
          letter-spacing="10"
          fill="#005F3C"
          filter="url(#softShadow)">
      SONKO
    </text>

    <!-- 2028 -->
    <text x="256"
          y="465"
          font-size="38"
          font-weight="700"
          letter-spacing="12"
          fill="#F7C948">
      2028
    </text>
  </g>
</svg>
