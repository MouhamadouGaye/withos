<!-- frontend/public/logo-sonko29.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Dégradé pour le fond circulaire -->
    <linearGradient id="pastefGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" /> <!-- Rouge foncé -->
      <stop offset="50%" style="stop-color:#B22222;stop-opacity:1" /> <!-- Rouge moyen -->
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" /> <!-- Vert foncé -->
    </linearGradient>
    
    <!-- Dégradé pour l'étoile -->
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre portée -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Effet de brillance -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cercle principal -->
  <circle cx="250" cy="250" r="230" fill="url(#pastefGradient)" filter="url(#shadow)" />
  
  <!-- Cercle intérieur (effet de bordure) -->
  <circle cx="250" cy="250" r="215" fill="none" stroke="#FFD700" stroke-width="3" stroke-opacity="0.3"/>
  
  <!-- Étoile africaine (symbole panafricain) -->
  <polygon points="250,100 265,170 340,170 280,215 305,285 250,245 195,285 220,215 160,170 235,170" 
           fill="url(#starGradient)" filter="url(#glow)"/>
  
  <!-- Carte du Sénégal stylisée -->
  <path d="M 200,320 L 220,310 L 240,315 L 260,305 L 280,310 L 300,320 
           L 295,340 L 280,350 L 260,355 L 240,355 L 220,350 L 205,340 Z" 
        fill="#FFD700" fill-opacity="0.8" />
  
  <!-- Point représentant Dakar -->
  <circle cx="250" cy="335" r="4" fill="#FFFFFF"/>
  
  <!-- Texte principal "SONKO" -->
  <text x="250" y="420" font-family="'Arial Black', 'Impact', sans-serif" 
        font-size="52" font-weight="900" fill="#FFD700" text-anchor="middle" 
        letter-spacing="8" filter="url(#glow)">
    SONKO
  </text>
  
  <!-- Texte "29" avec style -->
  <text x="250" y="465" font-family="'Arial Black', 'Impact', sans-serif" 
        font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle" 
        letter-spacing="4" opacity="0.9">
    2029
  </text>
  
  <!-- Petits rayons lumineux autour du cercle -->
  <g stroke="#FFD700" stroke-width="2" stroke-opacity="0.4">
    <line x1="250" y1="20" x2="250" y2="40"/>
    <line x1="250" y1="460" x2="250" y2="480"/>
    <line x1="20" y1="250" x2="40" y2="250"/>
    <line x1="460" y1="250" x2="480" y2="250"/>
    <line x1="87" y1="87" x2="101" y2="101"/>
    <line x1="399" y1="399" x2="413" y2="413"/>
    <line x1="87" y1="413" x2="101" y2="399"/>
    <line x1="399" y1="101" x2="413" y2="87"/>
  </g>
</svg>