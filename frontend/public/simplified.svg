<!-- frontend/public/avecsonko2029-fleche.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="transparent"/>
  
  <!-- Flèche vers l'avant (constance dans l'action) -->
  <polygon points="150,40 190,100 165,100 165,220 135,220 135,100 110,100" 
           fill="#8B0000"/>
  
  <!-- Trajectoire -->
  <line x1="90" y1="160" x2="240" y2="160" stroke="#006400" stroke-width="3" stroke-dasharray="8,5"/>
  
  <!-- Cible -->
  <circle cx="240" cy="160" r="20" fill="none" stroke="#FFD700" stroke-width="3"/>
  <circle cx="240" cy="160" r="8" fill="#FFD700"/>
  
  <!-- Texte AVEC SONKO -->
  <text x="150" y="250" font-family="'Arial Black', sans-serif" font-size="18" 
        font-weight="900" fill="#8B0000" text-anchor="middle" letter-spacing="3">
    AVEC
  </text>
  <text x="150" y="275" font-family="'Arial Black', sans-serif" font-size="26" 
        font-weight="900" fill="#006400" text-anchor="middle" letter-spacing="5">
    SONKO
  </text>
  <text x="150" y="305" font-family="'Arial', sans-serif" font-size="20" 
        font-weight="800" fill="#FFD700" text-anchor="middle" letter-spacing="6">
    2029
  </text>
</svg>